name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          cache: true
      - run: pixi run lint

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          cache: true
      - run: npm ci
      - run: pixi run build
      - run: pixi run test

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          cache: true
      - run: pixi run docs-build

  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml tomlkit

      - name: Run sync script
        run: python scripts/sync_zenodo.py

      - name: Check for drift
        run: |
          if ! git diff --exit-code .zenodo.json pyproject.toml; then
            echo "::error::Citation metadata is out of sync with CITATION.cff — run 'pixi run sync-zenodo'"
            exit 1
          fi
